project:
  type: website
  output-dir: ../docs/

execute:
  freeze: auto

website:
  title: "$ALTDOC_PACKAGE_NAME"
  code-links: true
  navbar:
    search: true
    right:
      - icon: github
        href: $ALTDOC_PACKAGE_URL_GITHUB
        aria-label: $ALTDOC_PACKAGE_NAME GitHub
  sidebar:
    collapse-level: 1
    contents:
      - text: Home
        file: index.md
      # Single-item sections need the explicit text:/file: form.
      # altdoc serializes the sidebar via yaml::as.yaml(), which
      # collapses a one-item `- foo.qmd` sequence into the scalar
      # `contents: foo.qmd` and breaks Quarto's sidebar link.
      - section: Getting started
        contents:
          - text: "Introduction"
            file: vignettes/introduction.qmd
      - section: Classical odds ratios
        contents:
          - vignettes/unmatched-cc.qmd
          - vignettes/matched-cc.qmd
          - vignettes/multiple-groups.qmd
      # Single-item section: explicit text:/file: form (see note above) so the
      # one-item sequence is not collapsed to a broken scalar.
      - section: Case-cohort designs
        contents:
          - text: "Case-cohort hazard ratios and absolute risk"
            file: vignettes/case-cohort.qmd
      - section: Risk-set designs
        contents:
          - text: "Nested case-control"
            file: vignettes/nested-cc.qmd
          - text: "IPW analysis of NCC data"
            file: vignettes/ipw-ncc.qmd
      - section: $ALTDOC_MAN_BLOCK
      - text: News
        file: $ALTDOC_NEWS
      - text: Changelog
        file: $ALTDOC_CHANGELOG
      - text: License
        file: $ALTDOC_LICENSE
      - text: Licence
        file: $ALTDOC_LICENCE
      - text: Code of conduct
        file: $ALTDOC_CODE_OF_CONDUCT
      - text: Citation
        file: $ALTDOC_CITATION

format:
  html:
    code-link: true
    theme: lumen
    toc: true
    toc-depth: 3
